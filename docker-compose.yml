services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: frictionlens-postgres
    environment:
      POSTGRES_DB: frictionlens
      POSTGRES_USER: frictionlens
      POSTGRES_PASSWORD: frictionlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frictionlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: frictionlens-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgdata:
  ollama_data:
