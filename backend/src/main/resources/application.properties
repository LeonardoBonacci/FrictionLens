spring.application.name=frictionlens

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/frictionlens
spring.datasource.username=frictionlens
spring.datasource.password=frictionlens
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Ollama
ollama.base-url=http://localhost:11434
ollama.model=llama3.1:latest
ollama.connect-timeout-ms=5000
ollama.read-timeout-ms=120000
ollama.max-retries=2
ollama.retry-delay-ms=1000

# Server
server.port=8080
