apiVersion: apps/v1
kind: Deployment
metadata:
  name: frictionlens-backend
  namespace: frictionlens
  labels:
    app: frictionlens-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frictionlens-backend
  template:
    metadata:
      labels:
        app: frictionlens-backend
    spec:
      containers:
        - name: backend
          image: leonardobonacci/frictionlens-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: frictionlens-backend-config
          env:
            # DB credentials come from the same Secret used by CNPG
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: frictionlens-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frictionlens-db-credentials
                  key: password
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      # Wait for the postgres cluster to be ready before scheduling the backend
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z frictionlens-postgres-rw 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 3
              done
              echo "PostgreSQL is up."
