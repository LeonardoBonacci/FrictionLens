# Database credentials used by CNPG to create the app user + DB,
# and referenced by the backend deployment.
#
# !! Change the password before deploying to a real environment !!
# Consider using Sealed Secrets / External Secrets Operator instead.
apiVersion: v1
kind: Secret
metadata:
  name: frictionlens-db-credentials
  namespace: frictionlens
type: kubernetes.io/basic-auth
stringData:
  username: frictionlens
  password: frictionlens
