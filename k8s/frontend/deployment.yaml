apiVersion: apps/v1
kind: Deployment
metadata:
  name: frictionlens-frontend
  namespace: frictionlens
  labels:
    app: frictionlens-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frictionlens-frontend
  template:
    metadata:
      labels:
        app: frictionlens-frontend
    spec:
      containers:
        - name: frontend
          image: leonardobonacci/frictionlens-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          # Optional: override nginx config without rebuilding the image
          # volumeMounts:
          #   - name: nginx-config
          #     mountPath: /etc/nginx/conf.d/default.conf
          #     subPath: default.conf
      # volumes:
      #   - name: nginx-config
      #     configMap:
      #       name: frictionlens-frontend-nginx
