# nginx.conf is baked into the frontend Docker image (frontend/nginx.conf).
# This ConfigMap is provided as an optional override — mount it if you need to
# change the backend service URL without rebuilding the image.
#
# To activate: uncomment the volume + volumeMount in deployment.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: frictionlens-frontend-nginx
  namespace: frictionlens
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass         http://frictionlens-backend:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
